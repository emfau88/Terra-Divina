<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07101f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Terra Divina</title>
  <link rel="icon" type="image/png" href="/assets/brand/app-icon.png" />
  <link rel="apple-touch-icon" href="/assets/brand/app-icon.png" />
  <link rel="stylesheet" href="/src/styles/mobile.css" />
</head>
<body>
  <div id="game-container"></div>

  <!-- Fullscreen-Button (oben rechts, nur sichtbar wenn kein Fullscreen aktiv) -->
  <button id="btn-fullscreen" aria-label="Vollbild" title="Vollbild">⛶</button>

  <script type="module" src="/src/main.ts"></script>

  <!-- ═══════════════════════════════════════════════════════════
       HAUPTMENÜ
       Füllt den gesamten Viewport. Kein eingebettetes Setup-Panel.
  ═══════════════════════════════════════════════════════════ -->
  <div id="main-menu">
    <div id="menu-inner">

      <!-- Kopfbereich: Logo + Titel -->
      <div id="menu-header">
        <img id="menu-crest" src="/assets/brand/menu-crest.png" alt="" aria-hidden="true" />
        <div id="menu-title">Terra Divina</div>
        <div id="menu-subtitle">Erschaffe, lenke und zerstoere eine lebendige Welt.</div>
      </div>

      <!-- Hauptaktionen -->
      <div class="menu-buttons" id="menu-actions">
        <button class="menu-btn menu-btn--disabled" id="btn-continue" disabled>
          <span class="menu-btn-icon menu-btn-icon--continue" aria-hidden="true"></span>
          <div class="menu-btn-text">
            <span class="menu-btn-label">Fortsetzen</span>
            <span class="menu-btn-sub">Kein Spielstand vorhanden</span>
          </div>
        </button>

        <button class="menu-btn menu-btn--primary" id="btn-new-world">
          <span class="menu-btn-icon menu-btn-icon--world" aria-hidden="true"></span>
          <div class="menu-btn-text">
            <span class="menu-btn-label">Neue Welt</span>
            <span class="menu-btn-sub">Freies Sandbox-Spiel</span>
          </div>
        </button>

        <button class="menu-btn" id="btn-scenario">
          <span class="menu-btn-icon menu-btn-icon--scenario" aria-hidden="true"></span>
          <div class="menu-btn-text">
            <span class="menu-btn-label">Szenario</span>
            <span class="menu-btn-sub">30 Tage überleben</span>
          </div>
        </button>

        <button class="menu-btn menu-btn--secondary" id="btn-options">
          <span class="menu-btn-icon menu-btn-icon--options" aria-hidden="true"></span>
          <div class="menu-btn-text">
            <span class="menu-btn-label">Optionen</span>
            <span class="menu-btn-sub"></span>
          </div>
        </button>
      </div>

      <!-- Optionen-Panel (inline, klappt ein/aus) -->
      <div id="options-panel" class="hidden">
        <div class="options-row">
          <span class="options-label">Vollbild</span>
          <button class="dock-btn" id="btn-menu-fullscreen">Aktivieren</button>
        </div>
        <div class="options-version">Terra Divina — v0.20</div>
      </div>

      <!-- Fußzeile mit Vollbild-Hinweis -->
      <div id="menu-footer">
        <button id="btn-menu-fs-hint" class="menu-fs-hint">
          ⛶&nbsp; Vollbild aktivieren
        </button>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       SETUP-SCREEN — eigenständiger Overlay-Screen
       Wird von MainMenuScene geöffnet/geschlossen.
  ═══════════════════════════════════════════════════════════ -->
  <div id="setup-screen" class="hidden">
    <div id="setup-screen-inner">

      <div class="screen-header">
        <button class="screen-back-btn" id="btn-setup-back">← Zurück</button>
        <img class="setup-header-crest" src="/assets/brand/setup-header-crest-small.png" alt="" aria-hidden="true" />
        <h2 class="screen-title">Neue Welt</h2>
      </div>

      <div class="screen-body">

        <div class="setup-section">
          <div class="setup-label">Weltgröße</div>
          <div class="setup-row" id="setup-size">
            <button class="setup-btn setup-btn--with-icon active" data-value="medium"><span class="setup-icon setup-icon--size setup-icon--size-medium" aria-hidden="true"></span><span>Mittel</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="small"><span class="setup-icon setup-icon--size setup-icon--size-small" aria-hidden="true"></span><span>Klein</span></button>
          </div>
        </div>

        <div class="setup-section">
          <div class="setup-label">Welttyp</div>
          <div class="setup-row" id="setup-type">
            <button class="setup-btn setup-btn--with-icon active" data-value="island"><span class="setup-icon setup-icon--type setup-icon--type-island" aria-hidden="true"></span><span>Insel</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="archipelago"><span class="setup-icon setup-icon--type setup-icon--type-archipelago" aria-hidden="true"></span><span>Archipel</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="forest"><span class="setup-icon setup-icon--type setup-icon--type-forest" aria-hidden="true"></span><span>Wald</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="mountain"><span class="setup-icon setup-icon--type setup-icon--type-mountain" aria-hidden="true"></span><span>Berge</span></button>
          </div>
        </div>

        <div class="setup-section">
          <div class="setup-label">Startmodus</div>
          <div class="setup-row" id="setup-mode">
            <button class="setup-btn setup-btn--with-icon" data-value="peaceful"><span class="setup-icon setup-icon--mode setup-icon--mode-peaceful" aria-hidden="true"></span><span>Friedlich</span></button>
            <button class="setup-btn setup-btn--with-icon active" data-value="balanced"><span class="setup-icon setup-icon--mode setup-icon--mode-balanced" aria-hidden="true"></span><span>Ausgeglichen</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="warTorn"><span class="setup-icon setup-icon--mode setup-icon--mode-war" aria-hidden="true"></span><span>Kriegslust</span></button>
            <button class="setup-btn setup-btn--with-icon" data-value="chaos"><span class="setup-icon setup-icon--mode setup-icon--mode-chaos" aria-hidden="true"></span><span>Chaos</span></button>
          </div>
        </div>

        <div class="setup-section">
          <div class="setup-label">Völker <span class="setup-faction-hint">mind. 2 wählen</span></div>
          <div class="setup-row setup-row--factions" id="setup-factions">
            <button class="setup-btn setup-btn--faction active" data-faction="human" data-fc="#5ec8ff">
              <span class="faction-icon faction-icon--human" aria-hidden="true"></span>
              <span class="faction-name">Menschen</span>
              <span class="faction-check">✓</span>
            </button>
            <button class="setup-btn setup-btn--faction active" data-faction="orc" data-fc="#ff5d63">
              <span class="faction-icon faction-icon--orc" aria-hidden="true"></span>
              <span class="faction-name">Orks</span>
              <span class="faction-check">✓</span>
            </button>
            <button class="setup-btn setup-btn--faction" data-faction="elf" data-fc="#6dff8a">
              <span class="faction-icon faction-icon--elf" aria-hidden="true"></span>
              <span class="faction-name">Elfen</span>
              <span class="faction-check">✓</span>
            </button>
            <button class="setup-btn setup-btn--faction" data-faction="dwarf" data-fc="#d4a04a">
              <span class="faction-icon faction-icon--dwarf" aria-hidden="true"></span>
              <span class="faction-name">Zwerge</span>
              <span class="faction-check">✓</span>
            </button>
          </div>
        </div>

        <div class="setup-section setup-seed-row">
          <div class="setup-label">Seed</div>
          <div class="setup-seed-value" id="setup-seed-display">123456</div>
          <button class="setup-btn setup-btn--reseed" id="btn-reseed"><span class="seed-reroll-icon" aria-hidden="true"></span><span>Neu</span></button>
        </div>

      </div><!-- /.screen-body -->

      <div class="screen-footer">
        <button class="menu-btn menu-btn--primary setup-start-btn" id="btn-start-game">
          <span class="setup-start-glyph" aria-hidden="true">▶</span>
          <div class="menu-btn-text">
            <span class="menu-btn-label">Welt starten</span>
            <span class="menu-btn-sub"></span>
          </div>
        </button>
      </div>

    </div><!-- /#setup-screen-inner -->
  </div><!-- /#setup-screen -->

  <!-- ═══════════════════════════════════════════════════════════
       SZENARIO-SCREEN — eigenständiger Overlay-Screen
  ═══════════════════════════════════════════════════════════ -->
  <div id="scenario-screen" class="hidden">
    <div id="scenario-screen-inner">

      <div class="screen-header">
        <button class="screen-back-btn" id="btn-scenario-back">← Zurück</button>
        <h2 class="screen-title">Szenario wählen</h2>
      </div>

      <div class="screen-body">
        <!-- Wird dynamisch von MainMenuScene befüllt -->
        <div id="scenario-list"></div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       ERGEBNIS-OVERLAY
  ═══════════════════════════════════════════════════════════ -->
  <div id="result-overlay" class="hidden">
    <div id="result-box">
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <button id="btn-result-action"></button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       KATEGORIE-HINT TOAST (kurzer Hinweis beim Tab-Wechsel)
  ═══════════════════════════════════════════════════════════ -->
  <div id="category-hint" class="hidden" aria-live="polite"></div>

</body>
</html>

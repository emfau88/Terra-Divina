<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#07101f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Terra Divina</title>
  <link rel="stylesheet" href="/src/styles/mobile.css" />
</head>
<body>
  <div id="game-container"></div>

  <!-- Fullscreen-Button (oben rechts, nur sichtbar wenn kein Fullscreen aktiv) -->
  <button id="btn-fullscreen" aria-label="Vollbild" title="Vollbild">⛶</button>

  <script type="module" src="/src/main.ts"></script>

  <!-- Intro-Overlay: wird beim Start angezeigt, Uhr startet erst nach Klick -->
  <div id="intro-overlay">
    <div id="intro-box">
      <h1>Terra Divina</h1>
      <p class="intro-sub">Eine kleine lebendige Welt erwacht.</p>
      <div class="intro-goal"><strong>Ziel:</strong> Hilf der Welt, 30 Tage zu überleben.</div>
      <p class="intro-hint">Setze deine Gotteskräfte weise ein. Feuer, Krieg, Hunger und Katastrophen können ein Dorf schnell auslöschen.</p>
      <button id="btn-start-world">Welt starten</button>
    </div>
  </div>

  <!-- Ergebnis-Overlay: erscheint nach Sieg oder Niederlage -->
  <div id="result-overlay" class="hidden">
    <div id="result-box">
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <button id="btn-result-action"></button>
    </div>
  </div>
</body>
</html>
